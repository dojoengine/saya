name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-settlement:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Start services and run tests
        run: |
          docker compose up --exit-code-from e2e-tests
        env:
          PRIVATE_KEY_KATANA0: ${{ secrets.PRIVATE_KEY_KATANA0 || '0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912' }}
          ADDRESS_KATANA0: ${{ secrets.ADDRESS_KATANA0 || '0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec' }}
          CHAIN_ID: 'custom'

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs > /tmp/compose-logs.txt
          docker compose ps
          cat /tmp/compose-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose-logs.txt

      - name: Cleanup
        if: always()
        run: docker compose down -v
