[package]
name = "saya"
version = "0.2.2"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/dojoengine/saya"
description = "Settlement service for Katana."

[dependencies]
saya-core = { path = "../../saya/core" }
cairo-lang-starknet-classes = "=2.12.3"
dojo-utils = { git = "https://github.com/dojoengine/dojo", branch = "main" }

# TEE attestation
katana_tee_client = { git = "ssh://git@github.com/cartridge-gg/katana-tee.git", rev = "5c18802c8b298c11c3787c73626c84bb49b4651c" }
amd-sev-snp-attestation-prover = { git = "ssh://git@github.com/cartridge-gg/katana-tee.git", rev = "5c18802c8b298c11c3787c73626c84bb49b4651c", features = ["sp1"] }
amd-sev-snp-attestation-verifier = { git = "ssh://git@github.com/cartridge-gg/katana-tee.git", rev = "5c18802c8b298c11c3787c73626c84bb49b4651c" }
amd_tee_registry_client = { git = "ssh://git@github.com/cartridge-gg/katana-tee.git", rev = "5c18802c8b298c11c3787c73626c84bb49b4651c" }
x509-verifier-rust-crypto = { git = "ssh://git@github.com/cartridge-gg/katana-tee.git", rev = "5c18802c8b298c11c3787c73626c84bb49b4651c" }
alloy-primitives = "1.3.1"

anyhow.workspace = true
base64 = { version = "0.22.1" }
celestia-rpc = { version = "0.16.2", default-features = false }
celestia-types = { version = "0.20.0", default-features = false }
clap = { version = "4.5.23", default-features = false, features = ["derive", "env", "std"] }
env_logger = { version = "0.11.6", features = ["unstable-kv"] }
hex.workspace = true
log.workspace = true
serde_json.workspace = true
starknet = { git = "https://github.com/dojoengine/starknet-rs", branch = "feat/types-rs-100-blake2s" }
starknet_api = "0.16.0-rc.1"

starknet-types-core.workspace = true
thiserror = "1.0.40"
tokio = { version = "1.42.0", default-features = false, features = ["rt-multi-thread", "macros", "signal", "time"] }
url.workspace = true

