[workspace]
resolver = "2"

[workspace.package]
version = "0.2.2"
edition = "2021"
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/dojoengine/saya"

[workspace.dependencies]

[package]
name = "persistent"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true

[dependencies]
anyhow = { version = "1.0.95", default-features = false }
cairo-vm = "=2.5.0"
futures-util = { version = "0.3.31", default-features = false }
generate-pie = { git = "https://github.com/keep-starknet-strange/snos.git", rev = "6cf7040" }
clap = { version = "4.5.23", default-features = false, features = [
    "derive",
    "env",
    "std",
] }
env_logger = { version = "0.11.6", features = ["unstable-kv"] }
log = { version = "0.4.22", features = ["kv"] }
saya-core = { path = "../../saya/core" }
starknet = "0.17.0"
starknet_api = { git = "https://github.com/karnotxyz/sequencer", rev = "e04617e0581d5ec93a035ec0e15419b4c201b629" }
starknet-types-core = { version = "0.2.1", default-features = false }
tokio = { version = "1.42.0", default-features = false, features = [
    "macros",
    "rt-multi-thread",
    "signal",
    "time",
] }
url = { version = "2.5.4", default-features = false }
