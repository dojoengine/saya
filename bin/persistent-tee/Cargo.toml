[workspace]
resolver = "2"

[workspace.package]
version = "0.2.2"
edition = "2021"
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/dojoengine/saya"

[workspace.dependencies]

[package]
name = "persistent-tee"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true

[dependencies]
saya-core = { path = "../../saya/core" }
katana_tee_client = { git = "https://github.com/cartridge-gg/katana-tee.git", rev = "649f0864434ea7895a977318e502b4e19666d10b" }
amd-sev-snp-attestation-prover = { git = "https://github.com/cartridge-gg/katana-tee.git", rev = "649f0864434ea7895a977318e502b4e19666d10b", features = ["sp1"] }
amd-sev-snp-attestation-verifier = { git = "https://github.com/cartridge-gg/katana-tee.git", rev = "649f0864434ea7895a977318e502b4e19666d10b" }
amd_tee_registry_client = { git = "https://github.com/cartridge-gg/katana-tee.git", rev = "649f0864434ea7895a977318e502b4e19666d10b" }
x509-verifier-rust-crypto = { git = "https://github.com/cartridge-gg/katana-tee.git", rev = "649f0864434ea7895a977318e502b4e19666d10b" }
alloy-primitives = "1.3.1"

piltover = { package = "piltover", git = "https://github.com/cartridge-gg/piltover.git", branch = "feat/tee-persistent" }
cainome = { version = "0.10.1", features = ["abigen-rs"] }
sha3 = "0.10"

anyhow = "1"
clap = { version = "4", default-features = false, features = ["derive", "env", "std"] }
env_logger = { version = "0.11", features = ["unstable-kv"] }
log = { version = "0.4", features = ["kv"] }
starknet = "0.17.0"
starknet-types-core = { version = "0.2.1", default-features = false }
thiserror = "2"
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "macros", "signal", "time"] }
url = "2"

[patch.crates-io]
alloy = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-consensus = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-consensus-any = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-contract = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-eips = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-json-rpc = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-network = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-network-primitives = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-provider = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-rpc-client = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-rpc-types = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-rpc-types-any = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-rpc-types-engine = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-rpc-types-eth = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-serde = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-signer = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-signer-aws = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-signer-local = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-transport = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
alloy-transport-http = { git = "https://github.com/alloy-rs/alloy", tag = "v1.0.41" }
