# Full E2E stack: L2 (Katana) → Piltover setup → L3 (Katana) → Saya
#
# Individual layers can also be started in isolation using their sub-files:
#   docker compose -f compose.l2.yml up
#   docker compose -f compose.l3.yml up
#   docker compose -f compose.e2e.yml up

x-saya-common: &saya-common
  image: ${SAYA_IMAGE:-ghcr.io/dojoengine/saya:feat-tee}
  dns: 127.0.0.11
  networks: [saya_net]
  restart: "no"
  environment:
    PRIVATE_KEY: ${PRIVATE_KEY_KATANA0:-0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912}
    ACCOUNT_ADDRESS: ${ADDRESS_KATANA0:-0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec}
    CHAIN_ID: ${L2_CHAIN_ID:-KATANA}

x-sozo-common: &sozo-common
  build:
    context: docker
    dockerfile: Dockerfile.sozo
    args:
      SOZO_VERSION: "1.8.6"
  dns: 127.0.0.11
  networks: [saya_net]
  restart: "no"
  volumes:
    - ./contracts/messaging:/artifacts:ro

x-katana-l3: &katana-l3
  image: ghcr.io/dojoengine/katana:v1.7.0-snos.4
  dns: 127.0.0.11
  networks: [saya_net]
  restart: "no"
  volumes:
    - shared:/shared
  entrypoint: ["/bin/sh", "-c"]

services:
  # ── L2: Katana + Piltover setup ──────────────────────────────────────────

  katana_l2:
    image: ghcr.io/dojoengine/katana:v1.7.1
    container_name: katana_l2
    command: ["katana", "--dev", "--dev.no-fee", "--http.addr", "0.0.0.0"]
    ports:
      - "${L2_PORT:-5050}:5050"
    dns: 127.0.0.11
    networks: [saya_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5050 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  fact_registry_setup:
    <<: *saya-common
    container_name: fact_registry_setup
    depends_on:
      katana_l2:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ops core-contract \
          --private-key $${PRIVATE_KEY} \
          --account-address $${ACCOUNT_ADDRESS} \
          --settlement-chain-id $${CHAIN_ID} \
          --settlement-rpc-url http://katana_l2:5050 \
          declare-and-deploy-fact-registry-mock \
          --salt 0x0

  core_contract_declare:
    <<: *saya-common
    container_name: core_contract_declare
    depends_on:
      katana_l2:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ops core-contract \
          --private-key $${PRIVATE_KEY} \
          --account-address $${ACCOUNT_ADDRESS} \
          --settlement-chain-id $${CHAIN_ID} \
          --settlement-rpc-url http://katana_l2:5050 \
          declare

  core_contract_deploy:
    <<: *saya-common
    container_name: core_contract_deploy
    depends_on:
      core_contract_declare:
        condition: service_completed_successfully
    command:
      - ops
      - core-contract
      - --private-key
      - ${PRIVATE_KEY_KATANA0:-0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912}
      - --account-address
      - ${ADDRESS_KATANA0:-0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec}
      - --settlement-chain-id
      - ${L2_CHAIN_ID:-KATANA}
      - --settlement-rpc-url
      - http://katana_l2:5050
      - deploy
      - --salt
      - "0x0"

  core_contract_setup:
    <<: *saya-common
    container_name: core_contract_setup
    depends_on:
      core_contract_deploy:
        condition: service_completed_successfully
      fact_registry_setup:
        condition: service_completed_successfully
    command:
      - ops
      - core-contract
      - --private-key
      - ${PRIVATE_KEY_KATANA0:-0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912}
      - --account-address
      - ${ADDRESS_KATANA0:-0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec}
      - --settlement-chain-id
      - ${L2_CHAIN_ID:-KATANA}
      - --settlement-rpc-url
      - http://katana_l2:5050
      - setup-program
      - --core-contract-address
      - "0x1c8a55203cd99a6bfaf7cd91ae2ad953eff67b584826edab1857ca2e3c5db5d"
      - --chain-id
      - ${L3_CHAIN_ID:-custom}
      - --fact-registry-address
      - "0x3eb0d510d1238120bf7f9d176faafe0c7066797a86be985855952f87769d3bd"

  sn_msg_deploy:
    <<: *sozo-common
    container_name: sn_msg_deploy
    restart: on-failure
    depends_on:
      core_contract_setup:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sozo declare /artifacts/sn_msg.contract_class.json \
          --katana-account katana0 \
          --rpc-url http://katana_l2:5050

        sleep 2

        sozo deploy 0x011dceea1eeb800a2a87454e424acb9158b5c649687d92a045c3eb6b73a182db \
          --constructor-calldata 0x1c8a55203cd99a6bfaf7cd91ae2ad953eff67b584826edab1857ca2e3c5db5d \
          --salt 0x1234 \
          --katana-account katana0 \
          --rpc-url http://katana_l2:5050

  # ── L3: Katana init + appchain setup ─────────────────────────────────────

  katana_init:
    <<: *katana-l3
    container_name: katana_init
    depends_on:
      core_contract_setup:
        condition: service_completed_successfully
    command:
      - |
        katana init \
          --settlement-chain http://katana_l2:5050 \
          --output-path /shared/katana_config \
          --id ${L3_CHAIN_ID:-custom} \
          --settlement-contract ${CORE_CONTRACT_ADDRESS:-0x1c8a55203cd99a6bfaf7cd91ae2ad953eff67b584826edab1857ca2e3c5db5d} \
          --settlement-contract-deployed-block ${CORE_CONTRACT_DEPLOYED_BLOCK:-4} \
          --settlement-facts-registry ${FACT_REGISTRY_ADDRESS:-0x3eb0d510d1238120bf7f9d176faafe0c7066797a86be985855952f87769d3bd}

  katana_l3:
    <<: *katana-l3
    container_name: katana_l3
    depends_on:
      katana_init:
        condition: service_completed_successfully
    ports:
      - "${L3_PORT:-5051}:5050"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5050 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    command:
      - |
        katana --chain /shared/katana_config --http.addr 0.0.0.0

  appc_msg_sn_deploy:
    <<: *sozo-common
    container_name: appc_msg_sn_deploy
    depends_on:
      katana_l3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sozo declare /artifacts/appc_msg_sn.contract_class.json \
          --account-address ${APPC_ACCOUNT_ADDRESS:-0x1f401c745d3dba9b9da11921d1fb006c96f571e9039a0ece3f3b0dc14f04c3d} \
          --private-key ${APPC_PRIVATE_KEY:-0x7230b49615d175307d580c33d6fda61fc7b9aec91df0f5c1a5ebe3b8cbfee02} \
          --l1-data-gas 20000000000 \
          --l1-gas 20000000000 \
          --l1-gas-price 20000000000 \
          --l2-gas-price 20000000000 \
          --l1-data-gas-price 20000000000 \
          --l2-gas 20000000000 \
          --rpc-url http://katana_l3:5050

        sozo deploy 0x03653979a4d0bcd57a755a32a182d0650d9cd45cd3ff3be28a20c972e1c9c29c \
          --account-address ${APPC_ACCOUNT_ADDRESS:-0x1f401c745d3dba9b9da11921d1fb006c96f571e9039a0ece3f3b0dc14f04c3d} \
          --private-key ${APPC_PRIVATE_KEY:-0x7230b49615d175307d580c33d6fda61fc7b9aec91df0f5c1a5ebe3b8cbfee02} \
          --salt 0x1234 \
          --l1-data-gas 20000000000 \
          --l1-gas 20000000000 \
          --l1-gas-price 20000000000 \
          --l2-gas-price 20000000000 \
          --l1-data-gas-price 20000000000 \
          --l2-gas 20000000000 \
          --rpc-url http://katana_l3:5050

  # ── Saya: settlement daemon ───────────────────────────────────────────────

  saya:
    image: ${SAYA_IMAGE:-ghcr.io/dojoengine/saya:feat-tee}
    container_name: saya
    networks: [saya_net]
    restart: "no"
    environment:
      RUST_LOG: info,persistent=debug,saya_core=debug
    depends_on:
      sn_msg_deploy:
        condition: service_completed_successfully
      appc_msg_sn_deploy:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pgrep persistent"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 15s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        persistent start \
          --rollup-rpc http://katana_l3:5050 \
          --settlement-rpc http://katana_l2:5050 \
          --settlement-piltover-address 0x1c8a55203cd99a6bfaf7cd91ae2ad953eff67b584826edab1857ca2e3c5db5d \
          --settlement-account-address ${ADDRESS_KATANA0:-0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec} \
          --settlement-account-private-key ${PRIVATE_KEY_KATANA0:-0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912} \
          --mock-layout-bridge-program-hash 0x43c5c4cc37c4614d2cf3a833379052c3a38cd18d688b617e2c720e8f941cb8 \
          --mock-snos-from-pie \
          --db-dir /tmp/saya

networks:
  saya_net:
    name: saya_net

volumes:
  shared: {}
