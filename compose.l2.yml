# L2 (Starknet) infrastructure
#
# Starts Katana L2 and deploys all L2 contracts:
#   - Fact registry mock
#   - Piltover core contract (declare → deploy → setup-program)
#   - sn_msg contract
#
# Prerequisites:
#   Contract artifacts must exist in ./contracts/messaging/
#
# Usage:
#   docker compose -f compose.l2.yml up
#
# katana_l2 keeps running after setup; bring it down explicitly when done.
# The saya_net network is created here and shared with compose.l3.yml / compose.e2e.yml.

x-saya-common: &saya-common
  build:
    context: .
    dockerfile: Dockerfile
  dns: 127.0.0.11
  networks: [saya_net]
  restart: "no"
  environment:
    PRIVATE_KEY: ${PRIVATE_KEY_KATANA0:-0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912}
    ACCOUNT_ADDRESS: ${ADDRESS_KATANA0:-0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec}
    CHAIN_ID: ${L2_CHAIN_ID:-KATANA}

x-sozo-common: &sozo-common
  build:
    context: docker
    dockerfile: Dockerfile.sozo
    args:
      SOZO_VERSION: "1.8.6"
  dns: 127.0.0.11
  networks: [saya_net]
  restart: "no"
  volumes:
    - ./contracts/messaging:/artifacts:ro

services:
  katana_l2:
    image: ghcr.io/dojoengine/katana:v1.7.1
    container_name: katana_l2
    command: ["katana", "--dev", "--dev.no-fee", "--http.addr", "0.0.0.0"]
    ports:
      - "${L2_PORT:-5050}:5050"
    dns: 127.0.0.11
    networks: [saya_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5050 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  fact_registry_setup:
    <<: *saya-common
    container_name: fact_registry_setup
    depends_on:
      katana_l2:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ops core-contract \
          --private-key $${PRIVATE_KEY} \
          --account-address $${ACCOUNT_ADDRESS} \
          --settlement-chain-id $${CHAIN_ID} \
          --settlement-rpc-url http://katana_l2:5050 \
          declare-and-deploy-fact-registry-mock \
          --salt 0x0

  core_contract_declare:
    <<: *saya-common
    container_name: core_contract_declare
    depends_on:
      katana_l2:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ops core-contract \
          --private-key $${PRIVATE_KEY} \
          --account-address $${ACCOUNT_ADDRESS} \
          --settlement-chain-id $${CHAIN_ID} \
          --settlement-rpc-url http://katana_l2:5050 \
          declare

  core_contract_deploy:
    <<: *saya-common
    container_name: core_contract_deploy
    depends_on:
      core_contract_declare:
        condition: service_completed_successfully
    command:
      - ops
      - core-contract
      - --private-key
      - ${PRIVATE_KEY_KATANA0:-0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912}
      - --account-address
      - ${ADDRESS_KATANA0:-0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec}
      - --settlement-chain-id
      - ${L2_CHAIN_ID:-KATANA}
      - --settlement-rpc-url
      - http://katana_l2:5050
      - deploy
      - --salt
      - "0x0"

  core_contract_setup:
    <<: *saya-common
    container_name: core_contract_setup
    depends_on:
      core_contract_deploy:
        condition: service_completed_successfully
      fact_registry_setup:
        condition: service_completed_successfully
    command:
      - ops
      - core-contract
      - --private-key
      - ${PRIVATE_KEY_KATANA0:-0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912}
      - --account-address
      - ${ADDRESS_KATANA0:-0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec}
      - --settlement-chain-id
      - ${L2_CHAIN_ID:-KATANA}
      - --settlement-rpc-url
      - http://katana_l2:5050
      - setup-program
      - --core-contract-address
      - "0x5f8c60f1c40b63452d3b5cb39669d35b37ec57d0761ad12ecdadd00c3d90102"
      - --chain-id
      - ${L3_CHAIN_ID:-custom}
      - --fact-registry-address
      - "0x3eb0d510d1238120bf7f9d176faafe0c7066797a86be985855952f87769d3bd"

  sn_msg_deploy:
    <<: *sozo-common
    container_name: sn_msg_deploy
    restart: on-failure
    depends_on:
      core_contract_setup:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sozo declare /artifacts/sn_msg.contract_class.json \
          --katana-account katana0 \
          --rpc-url http://katana_l2:5050

        sleep 2

        sozo deploy 0x011dceea1eeb800a2a87454e424acb9158b5c649687d92a045c3eb6b73a182db \
          --constructor-calldata 0x5f8c60f1c40b63452d3b5cb39669d35b37ec57d0761ad12ecdadd00c3d90102 \
          --salt 0x1234 \
          --katana-account katana0 \
          --rpc-url http://katana_l2:5050

networks:
  saya_net:
    name: saya_net
